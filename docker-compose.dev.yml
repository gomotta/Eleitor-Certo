version: '3.9'

# Sobe apenas os bancos — rode backend e frontend com npm run dev localmente
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: eleitor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "#Ed1035ta!"
      POSTGRES_DB: eleitor_certo
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eleitor_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
